<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.dataset.theme = localStorage.getItem('sss_theme') || 'light';</script>
  <title>Profile — Swap, Share, Sustain</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div style="max-width:1100px;margin:0 auto">
      <a class="back-link" href="browse.html">← Back to browsing</a>
    </div>
    <div class="profile-head">
      <div class="profile-card" id="profile-card"></div>
    </div>

    <section class="profile-section">
      <h2 id="items-heading">Items</h2>
      <div class="item-grid" id="user-items"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
      const me = await UI.init();
      const id = UI.qs('id');

      // viewing your own profile? send you to the editable one
      if (me && id === me.id) { location.replace('profile.html'); return; }

      const user = id ? await SSS.getUser(id) : null;
      if (!user) {
        document.getElementById('profile-card').outerHTML =
          `<div class="empty" style="max-width:1100px;margin:0 auto"><p><strong>This student doesn't exist.</strong></p><p><a href="browse.html">Back to browsing</a>.</p></div>`;
        document.getElementById('items-heading').style.display = 'none';
        return;
      }

      const [rep, items] = await Promise.all([
        SSS.ratingSummary(user.id),
        SSS.listItems({ ownerId: user.id })
      ]);

      document.getElementById('profile-card').innerHTML = `
        ${UI.avatar(user)}
        <div class="profile-info">
          <h1>${UI.esc(user.name)}</h1>
          <p class="profile-meta" style="margin:0">${UI.esc(user.grade)} · joined ${UI.timeAgo(user.joinedAt)}</p>
          ${rep.count ? `<p class="rep" style="margin:6px 0 0">👍 ${rep.positive}% positive · ${rep.count} rated swap${rep.count > 1 ? 's' : ''}</p>` : ''}
        </div>`;

      document.getElementById('items-heading').textContent =
        items.length ? `${UI.esc(user.name)}'s items up for swap` : `${UI.esc(user.name)}'s items`;
      document.getElementById('user-items').innerHTML = items.length
        ? items.map(UI.itemCard).join('')
        : `<div class="empty" style="grid-column:1/-1"><p><strong>Nothing up for swap right now.</strong></p></div>`;
    })();
  </script>
</body>
</html>
