<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.dataset.theme = localStorage.getItem('sss_theme') || 'light';</script>
  <title>Item — Swap, Share, Sustain</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div style="max-width:1000px;margin:0 auto">
      <a class="back-link" href="browse.html">← Back to browsing</a>
    </div>
    <div class="detail" id="detail"></div>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
    const me = await UI.init();

    const detail = document.getElementById('detail');
    detail.innerHTML = '<p style="grid-column:1/-1;color:var(--ink-soft)">Loading…</p>';

    async function render() {
      const item = await SSS.getItem(UI.qs('id'));
      if (!item) {
        detail.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <p><strong>This item doesn't exist anymore.</strong></p>
          <p>It may have been removed by its owner. <a href="browse.html">Back to browsing</a>.</p>
        </div>`;
        return;
      }

      const cat = UI.catInfo(item.category);
      const owner = item.owner;
      const isOwner = me && me.id === item.ownerId;

      let action = '';
      let pending = null;
      let myItems = [];
      const rep = owner ? await SSS.ratingSummary(owner.id) : { count: 0, positive: 0 };

      if (isOwner) {
        action = `
          <div class="swap-panel">
            <h2>This is your item</h2>
            <p style="color:var(--ink-soft)">Requests from other students will appear on your <a href="profile.html">profile</a>.</p>
            ${item.status === 'available'
              ? `<button class="btn btn-danger btn-small" id="remove-btn">Remove this item</button>`
              : `<p><span class="badge badge-swapped">Swapped</span> — this item found its new owner. 🎉</p>`}
          </div>`;
      } else if (item.status !== 'available') {
        action = `
          <div class="swap-panel">
            <h2>Already swapped</h2>
            <p style="color:var(--ink-soft);margin:0">This item found a new owner. <a href="browse.html">Browse what's still available</a>.</p>
          </div>`;
      } else if (!me) {
        action = `
          <div class="swap-panel">
            <h2>Want this?</h2>
            <p style="color:var(--ink-soft)">Log in to request a swap.</p>
            <a class="btn" href="login.html?next=${encodeURIComponent('item.html?id=' + item.id)}">Log in to request</a>
          </div>`;
      } else if (pending = await SSS.pendingRequestFor(item.id)) {
        action = `
          <div class="swap-panel">
            <h2>Request sent ✓</h2>
            <p style="color:var(--ink-soft)">Waiting for ${UI.esc(owner ? owner.name : 'the owner')} to answer. Track it on your <a href="profile.html">profile</a>.</p>
            <a class="btn btn-small" href="chat.html?request=${encodeURIComponent(pending.id)}">💬 Chat with ${UI.esc(owner ? owner.name : 'the owner')}</a>
          </div>`;
      } else {
        myItems = await SSS.listItems({ ownerId: me.id });
        const options = myItems.map(i =>
          `<option value="${UI.esc(i.id)}">${UI.esc(i.title)}</option>`
        ).join('');
        action = `
          <div class="swap-panel">
            <h2>Request a swap</h2>
            <form id="swap-form">
              <div class="field">
                <label for="offered">Offer one of your items <span style="font-weight:400;color:var(--ink-soft)">(optional)</span></label>
                <select id="offered">
                  <option value="">Nothing — just asking</option>
                  ${options}
                </select>
                <div id="offer-preview"></div>
                ${myItems.length === 0 ? '<p class="hint">You haven\'t posted anything yet — you can still ask for the item.</p>' : ''}
              </div>
              <div class="field">
                <label for="message">Message to ${UI.esc(owner ? owner.name : 'the owner')}</label>
                <textarea id="message" maxlength="300" placeholder="Why do you need it? When can you meet?"></textarea>
              </div>
              <p class="form-error" id="swap-error" role="alert"></p>
              <button class="btn form-full" type="submit">Send swap request</button>
            </form>
          </div>`;
      }

      detail.innerHTML = `
        <div class="detail-media">${UI.cardImage(item, 'detail-img')}</div>
        <div>
          <span class="chip chip-${cat.id}">${cat.emoji} ${UI.esc(cat.label)}</span>
          <span class="badge badge-${item.status}" style="margin-left:8px">${item.status === 'available' ? 'Available' : 'Swapped'}</span>
          <h1>${UI.esc(item.title)}</h1>
          <div class="detail-meta">
            <span><strong>Condition:</strong> ${UI.esc(item.condition)}</span>
            <span>·</span>
            <span>Posted ${UI.timeAgo(item.createdAt)}</span>
          </div>
          <p class="detail-desc">${UI.esc(item.description) || '<em>No description — ask the owner about it.</em>'}</p>
          <div class="owner-card">
            ${owner ? `<a href="user.html?id=${encodeURIComponent(owner.id)}" style="text-decoration:none;color:inherit">${UI.avatar(owner)}</a>` : UI.avatar(owner)}
            <div>
              <div class="owner-name">${owner ? `<a href="user.html?id=${encodeURIComponent(owner.id)}" style="color:inherit;text-decoration:none">${UI.esc(owner.name)}</a>` : 'A student'}</div>
              <div class="owner-meta">${UI.esc(owner ? owner.grade : '')}${owner ? ' · joined ' + UI.timeAgo(owner.joinedAt) : ''}</div>
              ${rep.count ? `<div class="rep">👍 ${rep.positive}% positive · ${rep.count} rated swap${rep.count > 1 ? 's' : ''}</div>` : ''}
              ${owner && !isOwner ? `<a href="user.html?id=${encodeURIComponent(owner.id)}" style="font-size:.85rem;font-weight:600">View profile →</a>` : ''}
            </div>
            ${me && !isOwner ? `<button id="report-btn" title="Report this item to the moderators" style="margin-left:auto;border:0;background:none;cursor:pointer;font:inherit;font-size:.85rem;font-weight:600;color:var(--ink-soft)">🚩 Report</button>` : ''}
          </div>
          ${action}
        </div>`;

      const reportBtn = document.getElementById('report-btn');
      if (reportBtn) {
        reportBtn.addEventListener('click', async () => {
          const reason = prompt('Why are you reporting this item? (You can leave it blank.)');
          if (reason === null) return;
          const r = await SSS.reportItem(item.id, reason);
          if (r.ok) UI.toast('Reported — the moderators will take a look. 🚩');
          else UI.toast(r.error, false);
        });
      }

      const removeBtn = document.getElementById('remove-btn');
      if (removeBtn) {
        removeBtn.addEventListener('click', async () => {
          if (!confirm('Remove this item from the board? This can\'t be undone.')) return;
          const r = await SSS.removeItem(item.id);
          if (r.ok) location.href = 'profile.html';
          else UI.toast(r.error, false);
        });
      }

      const swapForm = document.getElementById('swap-form');
      if (swapForm) {
        // show a photo of the item being offered as soon as it's picked
        const offeredSelect = document.getElementById('offered');
        const preview = document.getElementById('offer-preview');
        offeredSelect.addEventListener('change', () => {
          const chosen = myItems.find(i => i.id === offeredSelect.value);
          preview.innerHTML = chosen
            ? `${UI.itemThumb(chosen)}<span><span class="pair-label">you would give</span><span class="pair-title">${UI.esc(chosen.title)}</span></span>`
            : '';
          preview.style.display = chosen ? 'flex' : 'none';
        });
        preview.style.display = 'none';

        swapForm.addEventListener('submit', async e => {
          e.preventDefault();
          const btn = swapForm.querySelector('button[type="submit"]');
          btn.disabled = true;
          btn.textContent = 'Sending…';
          const r = await SSS.createRequest({
            itemId: item.id,
            offeredItemId: offeredSelect.value || null,
            message: document.getElementById('message').value
          });
          if (r.ok) {
            // straight into the chat so the two students can plan the swap
            location.href = 'chat.html?request=' + encodeURIComponent(r.requestId);
          } else {
            btn.disabled = false;
            btn.textContent = 'Send swap request';
            document.getElementById('swap-error').textContent = r.error;
          }
        });
      }
    }

    await render();
    if (UI.qs('posted')) UI.toast('Your item is on the board! 🎉');
    })();
  </script>
</body>
</html>
