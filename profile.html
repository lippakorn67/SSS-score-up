<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>document.documentElement.dataset.theme = localStorage.getItem('sss_theme') || 'light';</script>
  <title>Your profile — Swap, Share, Sustain</title>
  <link rel="icon" type="image/png" href="img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="profile-head">
      <div class="profile-card" id="profile-card"></div>
    </div>

    <section class="profile-section">
      <h2>Your badges</h2>
      <div class="badge-grid" id="badges"></div>
    </section>

    <section class="profile-section">
      <h2>Your items <span class="count-note" id="items-note"></span></h2>
      <div id="my-items"></div>
    </section>

    <section class="profile-section">
      <h2>Requests for your items <span class="count-note" id="incoming-note"></span></h2>
      <div id="incoming"></div>
    </section>

    <section class="profile-section">
      <h2>Requests you've sent <span class="count-note" id="sent-note"></span></h2>
      <div id="sent"></div>
    </section>
  </main>

  <footer id="site-footer"></footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/config.js"></script>
  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    (async () => {
    const me = await UI.init('profile');
    if (!UI.requireLogin(me)) return;

    function statusBadge(status) {
      const label = { pending: 'Pending', accepted: 'Accepted', declined: 'Declined', cancelled: 'Cancelled' }[status] || status;
      return `<span class="badge badge-${status}">${label}</span>`;
    }

    function itemLink(item) {
      return item
        ? `<a href="item.html?id=${encodeURIComponent(item.id)}">${UI.esc(item.title)}</a>`
        : '<em>an item that was removed</em>';
    }

    /* Side-by-side photos of the wanted item and the offered item. */
    function swapPair(req, wantLabel, offerLabel) {
      const side = (item, label) => item
        ? `<a class="pair-side" href="item.html?id=${encodeURIComponent(item.id)}">
             ${UI.itemThumb(item)}
             <span><span class="pair-label">${label}</span><span class="pair-title">${UI.esc(item.title)}</span></span>
           </a>`
        : `<span class="pair-side">
             <span class="pair-none">🤲</span>
             <span><span class="pair-label">${label}</span><span class="pair-title">Nothing — just asking</span></span>
           </span>`;
      return `<div class="swap-pair">${side(req.item, wantLabel)}<span class="pair-arrow">⇄</span>${side(req.offered, offerLabel)}</div>`;
    }

    /* After an accepted swap, each side confirms it happened by
       rating the other person once. */
    function rateRow(req, partner) {
      if (!partner) return '';
      if (req.myRating) {
        const face = { 3: '👍', 2: '😐', 1: '👎' }[req.myRating];
        return `<p class="rep" style="margin-top:10px">You rated this swap ${face} — thanks for confirming!</p>`;
      }
      return `<div class="rate-row">
        <span class="rep">Did the swap happen? Rate ${UI.esc(partner.name)}:</span>
        <button class="rate-btn" data-rate="3" data-req="${UI.esc(req.id)}" data-target="${UI.esc(partner.id)}" title="Great swap">👍</button>
        <button class="rate-btn" data-rate="2" data-req="${UI.esc(req.id)}" data-target="${UI.esc(partner.id)}" title="It was okay">😐</button>
        <button class="rate-btn" data-rate="1" data-req="${UI.esc(req.id)}" data-target="${UI.esc(partner.id)}" title="There was a problem">👎</button>
      </div>`;
    }

    function chatButton(req, primary) {
      return `<a class="btn ${primary ? '' : 'btn-outline '}btn-small" href="chat.html?request=${encodeURIComponent(req.id)}">💬 Chat${req.unread ? ` <span class="notif">${req.unread}</span>` : ''}</a>`;
    }

    function contactBox(user, lead, req, contact) {
      if (!user) return '';
      const bits = [UI.esc(user.grade)];
      if (user.schoolNumber) bits.push('school number <strong>' + UI.esc(user.schoolNumber) + '</strong>');
      if (contact && contact.phone) bits.push('📞 <strong>' + UI.esc(contact.phone) + '</strong>');
      if (contact && contact.email) bits.push('✉️ <strong>' + UI.esc(contact.email) + '</strong>');
      return `<div class="contact-box">
        <p class="hand">${UI.esc(lead)}</p>
        <p><strong>${UI.esc(user.name)}</strong> · ${bits.join(' · ')}</p>
        <p style="color:var(--ink-soft);font-size:.9rem">Plan a time and place in the chat, check the items together, then swap.</p>
        ${chatButton(req, true)}
      </div>`;
    }

    async function render() {
      document.getElementById('profile-card').innerHTML = `
        <div class="avatar-wrap">
          ${UI.avatar(me)}
          <button class="avatar-edit" id="avatar-btn" title="Change your profile picture" type="button">📷</button>
          <input id="avatar-input" type="file" accept="image/*" hidden>
        </div>
        <div class="profile-info">
          <h1>${UI.esc(me.name)}</h1>
          <p class="profile-meta" style="margin:0">${UI.esc(me.grade)}${me.schoolNumber ? ' · school number ' + UI.esc(me.schoolNumber) : ''} · joined ${UI.timeAgo(me.joinedAt)}</p>
        </div>
        <button class="btn btn-outline btn-small" id="logout-btn">Log out</button>
        ${me.banned ? `<p style="width:100%;margin:8px 0 0;padding:10px 14px;background:#FBE9E4;border-radius:10px;color:var(--red);font-weight:600">Your account is muted by the moderators — you can browse, but you can't post, request or chat. Talk to the Swap, Share, Sustain team if you think this is a mistake.</p>` : ''}`;
      document.getElementById('logout-btn').addEventListener('click', async () => {
        await SSS.logOut();
        location.href = 'index.html';
      });

      document.getElementById('avatar-btn').addEventListener('click', () => {
        document.getElementById('avatar-input').click();
      });
      document.getElementById('avatar-input').addEventListener('change', async e => {
        const file = e.target.files[0];
        if (!file) return;
        try {
          const dataUrl = await UI.fileToDataURL(file, 300);
          const r = await SSS.updateAvatar(dataUrl);
          if (r.ok) {
            me.avatarUrl = r.url;
            UI.toast('Looking good! 📸');
            render();
          } else {
            UI.toast(r.error, false);
          }
        } catch (err) {
          UI.toast(err.message, false);
        }
      });

      /* ----- my items ----- */
      const mine = await SSS.listItems({ ownerId: me.id, includeSwapped: true });
      const { incoming, sent } = await SSS.myRequests();

      /* phone/email of accepted swap partners (the database only
         hands these out to the two people involved) */
      const partnerIds = incoming.filter(r => r.status === 'accepted' && r.sender).map(r => r.sender.id)
        .concat(sent.filter(r => r.status === 'accepted' && r.item && r.item.owner).map(r => r.item.owner.id));
      const contactMap = {};
      await Promise.all([...new Set(partnerIds)].map(async id => {
        contactMap[id] = await SSS.getContact(id);
      }));
      document.getElementById('items-note').textContent =
        mine.length === 0 ? '' : '(' + mine.length + ')';
      document.getElementById('my-items').innerHTML = mine.length === 0
        ? `<div class="empty"><p><strong>Your shelf is empty here.</strong></p><p><a href="upload.html">Post your first item</a> — it takes about a minute.</p></div>`
        : mine.map(item => `
            <div class="row-item">
              ${UI.itemThumb(item)}
              <div class="row-body">
                ${itemLink(item)}
                <div class="row-sub">${UI.esc(item.condition)} · posted ${UI.timeAgo(item.createdAt)}</div>
              </div>
              <span class="badge badge-${item.status}">${item.status === 'available' ? 'Available' : 'Swapped'}</span>
              ${item.status === 'available' ? `<div class="row-actions"><button class="btn btn-danger btn-small" data-remove="${UI.esc(item.id)}">Remove</button></div>` : ''}
            </div>`).join('') +
          `<p style="margin-top:14px"><a class="btn btn-small" href="upload.html">+ Post another item</a></p>`;

      document.querySelectorAll('[data-remove]').forEach(btn => {
        btn.addEventListener('click', async () => {
          if (!confirm('Remove this item from the board? This can\'t be undone.')) return;
          const r = await SSS.removeItem(btn.dataset.remove);
          if (r.ok) { UI.toast('Item removed.'); render(); }
          else UI.toast(r.error, false);
        });
      });

      /* ----- incoming requests ----- */
      document.getElementById('incoming-note').textContent =
        incoming.length === 0 ? '' : '(' + incoming.filter(r => r.status === 'pending').length + ' waiting)';
      document.getElementById('incoming').innerHTML = incoming.length === 0
        ? `<div class="empty"><p><strong>No requests yet.</strong></p><p>When someone wants one of your items, it shows up here.</p></div>`
        : incoming.map(req => {
            const from = req.sender;
            return `
              <div class="req">
                <div class="req-head">
                  <div>
                    <div class="req-title">${UI.esc(from ? from.name : 'A student')} wants ${itemLink(req.item)}</div>
                    <p class="req-sub">${UI.esc(from ? from.grade : '')} · ${UI.timeAgo(req.createdAt)}</p>
                  </div>
                  ${statusBadge(req.status)}
                </div>
                ${swapPair(req, 'they want', 'they offer')}
                ${req.message ? `<p class="req-msg"><span class="hand-label">they wrote:</span>${UI.esc(req.message)}</p>` : ''}
                ${req.status === 'pending' ? `
                  <div class="req-actions">
                    <button class="btn btn-small" data-accept="${UI.esc(req.id)}">Accept swap</button>
                    <button class="btn btn-outline btn-small" data-decline="${UI.esc(req.id)}">Decline</button>
                    ${chatButton(req)}
                  </div>` : ''}
                ${req.status === 'accepted' ? contactBox(from, 'time to meet up! →', req, from ? contactMap[from.id] : null) + rateRow(req, from) : ''}
              </div>`;
          }).join('');

      document.querySelectorAll('[data-accept]').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          const r = await SSS.acceptRequest(btn.dataset.accept);
          if (r.ok) { UI.toast('Swap accepted — arrange the exchange at school! 🎉'); render(); }
          else { btn.disabled = false; UI.toast(r.error, false); }
        });
      });
      document.querySelectorAll('[data-decline]').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          const r = await SSS.declineRequest(btn.dataset.decline);
          if (r.ok) { UI.toast('Request declined.'); render(); }
          else { btn.disabled = false; UI.toast(r.error, false); }
        });
      });

      /* ----- sent requests ----- */
      document.getElementById('sent-note').textContent =
        sent.length === 0 ? '' : '(' + sent.length + ')';
      document.getElementById('sent').innerHTML = sent.length === 0
        ? `<div class="empty"><p><strong>You haven't asked for anything yet.</strong></p><p><a href="browse.html">Browse the board</a> and see what you need.</p></div>`
        : sent.map(req => {
            const owner = req.item ? req.item.owner : null;
            return `
              <div class="req">
                <div class="req-head">
                  <div>
                    <div class="req-title">You asked for ${itemLink(req.item)}</div>
                    <p class="req-sub">from ${UI.esc(owner ? owner.name : 'a student')} · ${UI.timeAgo(req.createdAt)}</p>
                  </div>
                  ${statusBadge(req.status)}
                </div>
                ${swapPair(req, 'you want', 'you offer')}
                ${req.status === 'pending' ? `
                  <div class="req-actions">
                    ${chatButton(req)}
                    <button class="btn btn-outline btn-small" data-cancel="${UI.esc(req.id)}">Cancel request</button>
                  </div>` : ''}
                ${req.status === 'accepted' ? contactBox(owner, 'they said yes! →', req, owner ? contactMap[owner.id] : null) + rateRow(req, owner) : ''}
              </div>`;
          }).join('');

      document.querySelectorAll('[data-cancel]').forEach(btn => {
        btn.addEventListener('click', async () => {
          btn.disabled = true;
          const r = await SSS.declineRequest(btn.dataset.cancel);
          if (r.ok) { UI.toast('Request cancelled.'); render(); }
          else { btn.disabled = false; UI.toast(r.error, false); }
        });
      });

      /* ----- swap ratings ----- */
      document.querySelectorAll('[data-rate]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const r = await SSS.rateSwap(btn.dataset.req, btn.dataset.target, Number(btn.dataset.rate));
          if (r.ok) { UI.toast('Thanks for confirming the swap! 🙌'); render(); }
          else UI.toast(r.error, false);
        });
      });

      /* ----- badges ----- */
      const badges = await SSS.myBadges();
      document.getElementById('badges').innerHTML = badges.map(b => `
        <div class="badge-card${b.earned ? '' : ' locked'}" title="${UI.esc(b.desc)}">
          <span class="badge-emoji">${b.emoji}</span>
          <span><b>${UI.esc(b.label)}</b><span>${UI.esc(b.desc)}</span></span>
        </div>`).join('');
    }

    await render();
    })();
  </script>
</body>
</html>
