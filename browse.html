<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse items — Swap, Share, Sustain</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E♻️%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Public+Sans:wght@400;600;700&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header id="site-header"></header>

  <main>
    <div class="page-head">
      <span class="eyebrow">the swap board</span>
      <h1>Browse items</h1>
      <p class="page-sub">Everything here is offered by students at school, free to swap.</p>
    </div>

    <div class="filter-bar">
      <input class="search" id="search" type="search" placeholder="Search titles and descriptions…" aria-label="Search items">
      <div id="cat-chips" role="group" aria-label="Filter by category" style="display:flex;gap:8px;flex-wrap:wrap"></div>
    </div>
    <p class="result-count" id="result-count"></p>

    <div class="grid-wrap">
      <div class="item-grid" id="grid"></div>
    </div>
  </main>

  <footer id="site-footer"></footer>

  <script src="js/store.js"></script>
  <script src="js/app.js"></script>
  <script>
    UI.header('browse');
    UI.footer();

    const state = { q: '', category: UI.qs('cat') || '' };

    const chipWrap = document.getElementById('cat-chips');
    const cats = [{ id: '', label: 'All', emoji: '' }].concat(SSS.CATEGORIES);
    chipWrap.innerHTML = cats.map(c =>
      `<button class="chip-btn" data-cat="${c.id}">${c.emoji ? c.emoji + ' ' : ''}${c.label}</button>`
    ).join('');

    function render() {
      chipWrap.querySelectorAll('.chip-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.cat === state.category)
      );
      const list = SSS.listItems({
        q: state.q || undefined,
        category: state.category || undefined
      });
      const count = document.getElementById('result-count');
      count.textContent = list.length === 1 ? '1 item up for swap' : list.length + ' items up for swap';
      const grid = document.getElementById('grid');
      if (list.length === 0) {
        const catLabel = state.category ? UI.catInfo(state.category).label.toLowerCase() : '';
        grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
          <p><strong>Nothing here yet${catLabel ? ' in ' + UI.esc(catLabel) : ''}.</strong></p>
          <p>Have something to pass down? <a href="upload.html">Post the first one</a>.</p>
        </div>`;
      } else {
        grid.innerHTML = list.map(UI.itemCard).join('');
      }
    }

    chipWrap.addEventListener('click', e => {
      const btn = e.target.closest('.chip-btn');
      if (!btn) return;
      state.category = btn.dataset.cat;
      render();
    });

    let debounce;
    document.getElementById('search').addEventListener('input', e => {
      clearTimeout(debounce);
      debounce = setTimeout(() => {
        state.q = e.target.value.trim();
        render();
      }, 150);
    });

    render();
  </script>
</body>
</html>
